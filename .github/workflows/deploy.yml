name: Deploy PWA

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Créer .env.local depuis les secrets
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" >> .env.local
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env.local

      - name: Build PWA statique
        run: npx expo export --platform web

      - name: Créer 404.html pour SPA routing
        run: |
          cat > dist/404.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <script>
              // Redirige toutes les routes inconnues vers index.html en préservant le chemin
              var path = window.location.pathname.replace('/pikolet', '') || '/';
              sessionStorage.setItem('__spa_redirect', path + window.location.search);
              window.location.replace('/pikolet/');
            </script>
          </head>
          <body></body>
          </html>
          EOF

      - name: Déployer sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
